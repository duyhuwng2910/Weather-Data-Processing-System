version: 2

sources:
  - name: weather_data
    database: weather_data
    schema: weather_data
    tables:
      - name: weather_raw
        description: "Raw weather data ingested from Open-Meteo API"
        columns:
          - name: city_id
            description: "Foreign key to dim_city"
            tests:
              - not_null
          - name: ingest_ts
            description: "Timestamp khi record được ingest"
            tests:
              - not_null
          - name: event_ts
            description: "Timestamp của weather observation"
            tests:
              - not_null

      - name: dim_city
        columns:
          - name: id
            tests:
              - not_null
              - unique

      - name: dim_weather
        columns:
          - name: id
            tests:
              - not_null
              - unique

      - name: dim_weather_icon
        columns:
          - name: id
            tests:
              - not_null
