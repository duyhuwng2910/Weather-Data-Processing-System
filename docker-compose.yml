networks:
  weather_network:
    driver: bridge

volumes:
  mariadb_data:
  superset_home:

services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: weather_data
      MARIADB_USER: admin
      MARIADB_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - weather_network

  superset:
    image: apache/superset:latest
    container_name: superset
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
    environment:
      SUPERSET_SECRET_KEY: this_is_a_secret_key_change_me
    networks:
      - weather_network
